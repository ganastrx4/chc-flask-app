<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadísticas y Predicción de WLD</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        #price {
            font-size: 32px;
            font-weight: bold;
            color: #007bff;
        }
        .btn-predict {
            width: 100%;
            margin-bottom: 10px;
            font-weight: bold;
        }
        canvas {
            max-width: 100%;
            margin-top: 20px;
        }
        .indicator-results {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #28a745;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-3">📊 Estadísticas y Predicción de WLD</h1>

        <h2 class="mt-3">💰 Precio en Tiempo Real</h2>
        <p>Precio actual: <span id="price">Cargando...</span> USDT</p>

        <h2 class="mt-4">📉 Gráfico de Movimientos Recientes</h2>
        <canvas id="priceChart"></canvas>

        <h2 class="mt-4">📈 Predicción de Precio</h2>
        <p>Seleccione un período para ver la tendencia del mercado:</p>

        <div class="row">
            <div class="col-md-6">
                <button class="btn btn-primary btn-predict" onclick="getPrediction('5min')">5 Minutos</button>
                <button class="btn btn-primary btn-predict" onclick="getPrediction('15min')">15 Minutos</button>
                <button class="btn btn-primary btn-predict" onclick="getPrediction('30min')">30 Minutos</button>
                <button class="btn btn-primary btn-predict" onclick="getPrediction('1hr')">1 Hora</button>
            </div>
            <div class="col-md-6">
                <button class="btn btn-primary btn-predict" onclick="getPrediction('4hr')">4 Horas</button>
                <button class="btn btn-primary btn-predict" onclick="getPrediction('12hr')">12 Horas</button>
                <button class="btn btn-primary btn-predict" onclick="getPrediction('1d')">1 Día</button>
            </div>
        </div>

        <div class="indicator-results mt-3">
            <p id="predictionResult">Esperando predicción...</p>
        </div>
    </div>

    <script>
        let priceChart;
        let priceData = [];
        let timeLabels = [];

        // Función para obtener el precio en tiempo real de WLD/USDT
        function fetchPrice() {
            $.getJSON("https://api.binance.com/api/v3/ticker/price?symbol=WLDUSDT", function(data) {
                let price = parseFloat(data.price).toFixed(4);
                $("#price").text(price);

                let now = new Date().toLocaleTimeString();
                if (timeLabels.length > 30) {
                    timeLabels.shift();
                    priceData.shift();
                }
                timeLabels.push(now);
                priceData.push(price);

                updateChart();
            });
        }

        // Función para actualizar el gráfico
        function updateChart() {
            if (!priceChart) {
                let ctx = document.getElementById('priceChart').getContext('2d');
                priceChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: timeLabels,
                        datasets: [{
                            label: 'Precio de WLD/USDT',
                            data: priceData,
                            borderColor: '#007bff',
                            borderWidth: 2,
                            fill: false
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            x: {
                                title: {
                                    display: true,
                                    text: 'Tiempo'
                                }
                            },
                            y: {
                                title: {
                                    display: true,
                                    text: 'Precio (USDT)'
                                },
                                beginAtZero: false
                            }
                        }
                    }
                });
            } else {
                priceChart.data.labels = timeLabels;
                priceChart.data.datasets[0].data = priceData;
                priceChart.update();
            }
        }

        // Función para obtener la predicción basada en el intervalo de tiempo seleccionado
        function getPrediction(interval) {
            const results = ["📈 Subirá", "📉 Bajará"];
            const randomIndex = Math.floor(Math.random() * results.length);
            const prediction = results[randomIndex];

            document.getElementById('predictionResult').innerText = `Predicción para ${interval}: ${prediction}`;
        }

        // Obtener precio cada 5 segundos
        setInterval(fetchPrice, 5000);
        fetchPrice(); // Llamada inicial
    </script>
</body>
</html>
