<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Scanner Técnico - CHC</title>
  <style>
    body { font-family: Arial, sans-serif; background: #111; color: #eee; text-align: center; }
    table { border-collapse: collapse; width: 95%; margin: 20px auto; background: #222; }
    th, td { border: 1px solid #444; padding: 6px; font-size: 14px; }
    th { background: #333; color: #00ffcc; }
    input, button { padding: 6px; margin: 8px; }
    .buy { color: #0f0; font-weight: bold; }
    .sell { color: #f33; font-weight: bold; }
    .wait { color: #ff0; font-weight: bold; }
  </style>
</head>
<body>
  <h2>📊 Scanner Técnico (RSI + Soportes/Resistencias + Fibonacci)</h2>
  <input type="text" id="symbols" placeholder="Ej: WLDUSDT,BTCUSDT,ETHUSDT" value="WLDUSDT,BTCUSDT">
  <button onclick="loadAll()">Analizar</button>

  <table id="results">
    <thead>
      <tr>
        <th>Símbolo</th>
        <th>Intervalo</th>
        <th>Precio</th>
        <th>RSI</th>
        <th>Soporte 1</th>
        <th>Soporte 2</th>
        <th>Soporte 3</th>
        <th>Resistencia</th>
        <th>Recomendación</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    const intervals = ["1m","3m","5m","15m","30m","1h","2h","4h","6h","8h","12h","1d","3d"];

    async function getKlines(symbol, interval="5m", limit=200) {
      const url = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`;
      const res = await fetch(url);
      return await res.json();
    }

    function calcRSI(closes, period=14) {
      let gains = 0, losses = 0;
      for (let i = 1; i < period; i++) {
        let diff = closes[i] - closes[i-1];
        if (diff >= 0) gains += diff; else losses -= diff;
      }
      const RS = gains / (losses || 1);
      return 100 - (100 / (1 + RS));
    }

    function localExtrema(closes, window=3) {
      const supports = [], resistances = [];
      for (let i = window; i < closes.length - window; i++) {
        let val = closes[i];
        let left = closes.slice(i-window, i);
        let right = closes.slice(i+1, i+1+window);
        if (val <= Math.min(...left) && val <= Math.min(...right)) {
          supports.push(val);
        }
        if (val >= Math.max(...left) && val >= Math.max(...right)) {
          resistances.push(val);
        }
      }
      return {supports, resistances};
    }

    function getRecommendation(price, rsi, support, resistance) {
      if (support && price <= support * 1.002 && rsi < 55) {
        return "<span class='buy'>✅ BUY (soporte)</span>";
      }
      if (resistance && price >= resistance * 0.998 && rsi > 45) {
        return "<span class='sell'>❌ SELL (resistencia)</span>";
      }
      if (rsi < 35) {
        return "<span class='buy'>✅ BUY (RSI bajo)</span>";
      }
      if (rsi > 65) {
        return "<span class='sell'>❌ SELL (RSI alto)</span>";
      }
      return "<span class='wait'>⏳ WAIT</span>";
    }

    async function analyzeSymbol(symbol, interval) {
      try {
        const data = await getKlines(symbol, interval);
        const closes = data.map(d => parseFloat(d[4]));
        const price = closes[closes.length - 1];

        // RSI
        const rsi = calcRSI(closes.slice(-15));

        // soportes/resistencias
        const {supports, resistances} = localExtrema(closes);

        // Filtrar soportes solo debajo del precio
        const validSupports = supports.filter(s => s < price).sort((a,b) => b - a);
        const s1 = validSupports.length >= 1 ? `🟢 ${validSupports[0].toFixed(4)}` : "-";
        const s2 = validSupports.length >= 2 ? `🟢 ${validSupports[1].toFixed(4)}` : "-";
        const s3 = validSupports.length >= 3 ? `🟢 ${validSupports[2].toFixed(4)}` : "-";

        // Filtrar resistencias solo arriba del precio
        const validResistances = resistances.filter(r => r > price).sort((a,b) => a - b);
        const nearestResistance = validResistances.length ? validResistances[0] : null;

        // Recomendación en base al soporte más cercano
        const rec = getRecommendation(price, rsi, validSupports[0], nearestResistance);

        return {
          symbol, interval, price: price.toFixed(4),
          rsi: rsi.toFixed(2),
          support1: s1, support2: s2, support3: s3,
          resistance: nearestResistance ? `🔴 ${nearestResistance.toFixed(4)}` : "-",
          recommendation: rec
        };
      } catch (err) {
        console.error(`Error en ${symbol} ${interval}`, err);
        return null;
      }
    }

    async function loadAll() {
      const tbody = document.querySelector("#results tbody");
      tbody.innerHTML = "";
      const symbols = document.getElementById("symbols").value.split(",").map(s => s.trim().toUpperCase());

      for (let symbol of symbols) {
        for (let interval of intervals) {
          const result = await analyzeSymbol(symbol, interval);
          if (result) {
            const row = `<tr>
              <td>${result.symbol}</td>
              <td>${result.interval}</td>
              <td>${result.price}</td>
              <td>${result.rsi}</td>
              <td>${result.support1}</td>
              <td>${result.support2}</td>
              <td>${result.support3}</td>
              <td>${result.resistance}</td>
              <td>${result.recommendation}</td>
            </tr>`;
            tbody.innerHTML += row;
          }
        }
      }
    }

    // Auto actualización cada 2 minutos
    setInterval(loadAll, 120000);
  </script>
</body>
</html>
