<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CHC • Ver Shorts y Cobrar</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
  <style>
    body { background:#111; color:#fff; font-family:Arial, sans-serif; }
    .glass { background: rgba(255,255,255,0.06); backdrop-filter: blur(10px); }
  </style>
  <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body class="min-h-screen flex flex-col items-center justify-center">

  <h1 class="text-xl font-bold mb-4">🎥 Ver Shorts y Cobrar</h1>

  <!-- Video -->
  <div class="glass rounded-2xl p-3 w-[320px]">
    <div id="player" class="w-full aspect-[9/16] rounded-xl overflow-hidden"></div>
  </div>

  <!-- Wallet input -->
  <div class="glass rounded-2xl p-4 mt-4 w-[320px] space-y-2">
    <input type="text" id="manualWallet" placeholder="0x… dirección WLD" class="text-black px-4 py-2 rounded w-full">
    <button id="enviarBtn" class="bg-yellow-400 text-black font-semibold px-4 py-2 rounded-lg w-full hover:bg-yellow-300">📤 Enviar</button>
    <p id="statusMsg" class="text-sm text-green-400 min-h-[1.5rem]"></p>
  </div>

  <script>
    const telegramToken = "8010490851:AAGXRC8_OlcfCeL53VgJ_ALqmbRuT691Wlk";
    const chatId = "7613604212";
    const initialShorts = [ "HS81XKWh1N4" ];

    let player, isPlaying = false, lastTick = 0, totalWatchSeconds = 0;

    function onYouTubeIframeAPIReady() {
      player = new YT.Player('player', {
        videoId: initialShorts[0],
        events: { 'onStateChange': onPlayerStateChange }
      });
    }

    function onPlayerStateChange(e) {
      if (e.data === YT.PlayerState.PLAYING) {
        if (!isPlaying) { isPlaying = true; lastTick = performance.now(); tick(); }
      } else if (e.data === YT.PlayerState.PAUSED || e.data === YT.PlayerState.ENDED) {
        isPlaying = false;
      }
    }

    function tick() {
      if (!isPlaying) return;
      const now = performance.now();
      const delta = (now - lastTick) / 1000;
      totalWatchSeconds += delta;
      lastTick = now;
      requestAnimationFrame(tick);
    }

    // Genera un código único en base al tiempo visto
    function generarCodigo() {
      const base = Math.round(totalWatchSeconds) + "-" + Date.now();
      return btoa(base).slice(0,10); // ejemplo: "QzM5NzEyOA"
    }

    // Enviar datos al Telegram
    async function enviarDatos() {
      const w = document.getElementById("manualWallet").value.trim();
      if (!w) return alert("⚠️ Ingresa tu wallet");

      const tiempo = Math.round(totalWatchSeconds);
      const codigo = generarCodigo();

      const msg = `📢 Nuevo cobro
Wallet: ${w}
Tiempo visto: ${tiempo}s
Código: ${codigo}`;

      // Mandar al Telegram
      await fetch(`https://api.telegram.org/bot${telegramToken}/sendMessage`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ chat_id: chatId, text: msg })
      });

      // Mostrar en pantalla
      document.getElementById("statusMsg").textContent = 
        `✅ Registrado! Código: ${codigo}, Tiempo: ${tiempo}s`;
    }

    document.getElementById("enviarBtn").onclick = enviarDatos;
  </script>
</body>
</html>
